name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      # NOTE: the committed AppIcon.png (Assets.xcassets) is the source of truth.
      # A previous "Generate app icon" step here overwrote it on every build,
      # which is why the icon never updated — removed.

      - name: Build archive (unsigned — SideStore re-signs on install)
        run: |
          xcodebuild archive \
            -project flashback-remote.xcodeproj \
            -scheme FlashbackRemote \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FlashbackRemote.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Package IPA
        run: |
          APP="$RUNNER_TEMP/FlashbackRemote.xcarchive/Products/Applications/FlashbackRemote.app"
          PAYLOAD="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD"
          cp -r "$APP" "$PAYLOAD/"
          cd "$RUNNER_TEMP"
          zip -r FlashbackRemote.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashbackRemote-${{ github.sha }}
          path: ${{ runner.temp }}/FlashbackRemote.ipa
          retention-days: 90

      - name: Attach IPA to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/FlashbackRemote.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print IPA size (for manual sidestore-source.json update)
        if: github.event_name == 'release'
        run: |
          echo "IPA size: $(stat -f%z "$RUNNER_TEMP/FlashbackRemote.ipa" 2>/dev/null || stat -c%s "$RUNNER_TEMP/FlashbackRemote.ipa") bytes"
          echo "Update sidestore-source.json manually with this size and downloadURL:"
          echo "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FlashbackRemote.ipa"
